site_name: Python Guide

repo_name: 'yoannmos/PythonGuide'
repo_url: https://github.com/yoannmos/PythonGuide

nav:
    - Overview : index.md
    - 'installation.md'
    - Library :
        - "Library/path.md"
    - developement.md
    - Tips: not_imp.md
    - About: about.md
    # - 'test.md'§

theme:
    # name: 'rtd-dropdown'
    # name: 'readthedocs'
    name: 'material'
    palette:
        primary: 'Teal'
        accent: 'Deep Orange'
    # font:
    #     text: 'Calibri'
    #     code: 'Ubuntu Mono'
    logo:
        icon: 'explore'
    feature:
        tabs: true

markdown_extensions:
    - admonition
    - codehilite:
        guess_lang: false
    - toc:
        permalink: true

